name: Workday CI/CD Testing Pipeline

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      testType:
        description: Test Suite
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - regression
          - full

env:
  WORKDAY_USERNAME: ${{ secrets.WORKDAY_USERNAME }}
  WORKDAY_PASSWORD: ${{ secrets.WORKDAY_PASSWORD }}

jobs:

  build:
    name: Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Verify Project Build
        run: npm run build --if-present

  workday-tests:
    name: Workday Automated Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        if: github.event.inputs.testType == 'smoke'
        run: npx playwright test tests/smoke

      - name: Run Regression Tests
        if: github.event.inputs.testType == 'regression'
        run: npx playwright test tests/regression

      - name: Run Full Suite
        if: github.event.inputs.testType == 'full'
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  approval:
    name: QA Approval
    needs: workday-tests
    runs-on: ubuntu-latest

    steps:
      - name: Release Validation
        run: echo "QA Validation Successful - Ready for Deployment"

  deploy:
    name: Deploy To Sandbox
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: echo "Deploying Workday Package / Configuration to Sandbox"

  notify:
    name: Publish Results
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Notify Team
        run: |
          echo "Workday Testing Completed Successfully"
          echo "Smoke/Regression Validation Passed"